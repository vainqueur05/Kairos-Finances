{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Mes catégories</h1>
    <a href="{{ url_for('transactions.add_category') }}" class="btn btn-primary mb-3">Ajouter une catégorie</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>{{ category.description or '' }}</td>
                <td>
                    <a href="{{ url_for('transactions.edit_category', id=category.id) }}" class="btn btn-sm btn-warning">Modifier</a>
                    <form action="{{ url_for('transactions.delete_category', id=category.id) }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer cette catégorie ?')">Supprimer</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3">Aucune catégorie pour le moment.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
